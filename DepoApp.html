<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<title>DepoApp — DepoFilms</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="DepoApp">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<style>
  :root{--bg:#0a0a0a;--panel:#141414;--panel2:#1c1c1c;--line:#2a2a2a;--txt:#f2f2f2;--muted:#8f8f8f;
    --yellow:#ffd21e;--yellow2:#ffe06b;--yellowd:#3a3208;--green:#3ecf8e;--red:#ff5c5c;--blue:#5b9dff;--amber:#f5b942;--purple:#c88bff;--radius:16px}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:15px;line-height:1.45}
  .hidden{display:none!important}
  button{font-family:inherit;cursor:pointer;border:none;outline:none}
  input,select,textarea{font-family:inherit;font-size:15px}
  ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:8px}
  .logomark{display:inline-flex;align-items:center;gap:10px}
  .logotext{font-weight:800;letter-spacing:-.5px;line-height:1}.logotext b{color:var(--yellow)}
  #login{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:radial-gradient(1200px 600px at 50% -5%,#1c1a0a 0%,var(--bg) 55%)}
  #login .logomark{margin-bottom:6px}
  .tagline{color:var(--muted);margin-bottom:26px;font-size:12px;letter-spacing:3px;text-transform:uppercase}
  .who{width:100%;max-width:440px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .who button{background:var(--panel);border:1px solid var(--line);color:var(--txt);padding:14px 10px;border-radius:14px;font-weight:600;display:flex;flex-direction:column;gap:6px;align-items:center;transition:.15s}
  .who button:hover{border-color:var(--yellow);transform:translateY(-2px)}
  .who button.boss{grid-column:1/-1;background:linear-gradient(135deg,#2a2408,#141414);border-color:var(--yellow)}
  .avatar{width:40px;height:40px;border-radius:50%;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--yellow);font-size:15px;border:1px solid var(--line)}
  .avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover}
  .who small{color:var(--muted);font-weight:500;font-size:11.5px}
  #pinPad{width:100%;max-width:320px;text-align:center}
  #pinPad h3{margin:6px 0 2px}#pinPad p{color:var(--muted);margin:0 0 8px;font-size:13px}
  .pindots{display:flex;gap:12px;justify-content:center;margin:16px 0}
  .pindot{width:14px;height:14px;border-radius:50%;border:2px solid var(--line)}
  .pindot.on{background:var(--yellow);border-color:var(--yellow)}
  .keys{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .keys button{background:var(--panel);border:1px solid var(--line);color:var(--txt);height:60px;border-radius:14px;font-size:22px;font-weight:600}
  .keys button:active{background:var(--yellow);color:#111}
  .keys button.wide{font-size:15px}
  .link{color:var(--muted);background:none;margin-top:14px;font-size:13px;text-decoration:underline}
  .err{color:var(--red);font-size:13px;min-height:18px;margin-top:4px}
  #app{max-width:1100px;margin:0 auto;padding-bottom:96px}
  .topbar{position:sticky;top:0;z-index:20;background:rgba(10,10,10,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:10px 14px;display:flex;align-items:center;gap:10px}
  .topbar .spacer{flex:1}
  .userchip{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);padding:5px 10px 5px 5px;border-radius:30px;font-size:13px;font-weight:600}
  .userchip .avatar{width:26px;height:26px;font-size:11px}
  .roletag{font-size:10px;text-transform:uppercase;letter-spacing:1px;padding:2px 7px;border-radius:20px;background:var(--yellowd);color:var(--yellow2);border:1px solid #4a3f0e}
  .roletag.emp{background:#132030;color:var(--blue);border-color:#274158}
  .iconbtn{background:var(--panel);border:1px solid var(--line);color:var(--muted);width:34px;height:34px;border-radius:10px;font-size:16px}
  .iconbtn:hover{color:var(--yellow);border-color:var(--yellow)}
  main{padding:16px}
  .pagetitle{font-size:22px;font-weight:800;margin:6px 2px 16px}
  .pagetitle small{display:block;font-size:13px;color:var(--muted);font-weight:500;margin-top:2px}
  .sectitle{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:22px 2px 10px;font-weight:700}
  .sectitle:first-child{margin-top:6px}
  .grid{display:grid;gap:12px}.kpis{grid-template-columns:repeat(2,1fr)}
  @media(min-width:720px){.kpis{grid-template-columns:repeat(4,1fr)}}
  .g2{grid-template-columns:1fr}@media(min-width:760px){.g2{grid-template-columns:1fr 1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px}
  .kpi .lbl{color:var(--muted);font-size:11.5px;text-transform:uppercase;letter-spacing:.5px}
  .kpi .val{font-size:22px;font-weight:800;margin-top:4px}
  .kpi .sub{font-size:12px;color:var(--muted);margin-top:2px}
  .val.green{color:var(--green)}.val.red{color:var(--red)}.val.gold{color:var(--yellow)}
  .phead{display:flex;gap:14px;align-items:center;background:linear-gradient(135deg,#211d08,#141414);border:1px solid #3a3208;border-radius:var(--radius);padding:18px}
  .phead .big{width:64px;height:64px;border-radius:50%;background:var(--panel2);border:2px solid var(--yellow);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:var(--yellow)}
  .phead .big img{width:100%;height:100%;border-radius:50%;object-fit:cover}
  .phead .n{font-size:20px;font-weight:800}.phead .r{color:var(--muted);font-size:13px;margin-top:2px}
  .alertbanner{display:flex;align-items:center;gap:10px;background:#2a2408;border:1px solid var(--yellow);border-radius:14px;padding:12px 14px;margin:14px 0;font-weight:600;font-size:14px}
  .alertbanner .x{margin-left:auto}
  .match{display:flex;gap:12px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:10px}
  .match.nuevo{border-color:var(--yellow);box-shadow:0 0 0 1px var(--yellow) inset}
  .match .day{width:50px;text-align:center;flex-shrink:0}
  .match .day .d{font-size:20px;font-weight:800;line-height:1}
  .match .day .m{font-size:11px;color:var(--muted);text-transform:uppercase}
  .match .info{flex:1;min-width:0}.match .info .club{font-weight:700}
  .match .info .meta{font-size:12.5px;color:var(--muted);margin-top:2px}
  .match .right{text-align:right;flex-shrink:0}
  .pill{display:inline-block;font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap}
  .pill.prox{background:#132030;color:var(--blue)}.pill.film{background:#132a20;color:var(--green)}
  .pill.entreg{background:var(--yellowd);color:var(--yellow2)}
  .pill.edi{background:#241330;color:var(--purple)}.pill.noedi{background:#22262e;color:var(--muted)}
  .pill.nuevo{background:var(--yellow);color:#111}
  .pill.comp{background:#0e2a24;color:var(--green)}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;font-weight:700}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .tablewrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  tr.clk{cursor:pointer}tr.clk:hover td{background:var(--panel2)}
  .badge{font-size:10.5px;padding:2px 8px;border-radius:20px;font-weight:700}
  .badge.activo{background:#132a20;color:var(--green)}.badge.riesgo{background:#2e2513;color:var(--amber)}
  .badge.inactivo{background:#2a1a1a;color:var(--red)}
  .badge.ing{background:#132a20;color:var(--green)}.badge.egr{background:#2a1a1a;color:var(--red)}
  .badge.si{background:#132a20;color:var(--green)}.badge.no{background:#2a1a1a;color:var(--red)}
  .clubcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden}
  .clubhead{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer}
  .clubhead .nm{font-weight:700;flex:1}
  .clubhead .nm small{display:block;color:var(--muted);font-size:12px;font-weight:500}
  .clubhead .arw{color:var(--muted);transition:.2s;font-size:13px}
  .clubcard.open .arw{transform:rotate(90deg)}
  .clubbody{border-top:1px solid var(--line);padding:6px 14px 14px;display:none}
  .clubcard.open .clubbody{display:block}
  .catrow{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px dashed var(--line)}
  .catrow:last-child{border-bottom:none}
  .catrow .cn{flex:1;min-width:0}
  .catrow .cn small{display:block;color:var(--muted);font-size:11.5px}
  .catrow .pr{font-weight:700;color:var(--yellow);font-variant-numeric:tabular-nums;text-align:right}
  .catrow .pr small{display:block;color:var(--green);font-weight:600;font-size:11px}
  .obj{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;display:flex;gap:12px}
  .obj .chk{width:26px;height:26px;border-radius:8px;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:800;color:#111;cursor:pointer}
  .obj.done .chk{background:var(--green);border-color:var(--green)}
  .obj .body{flex:1;min-width:0}.obj .t{font-weight:700}
  .obj.done .t{text-decoration:line-through;color:var(--muted)}
  .obj .d{font-size:12.5px;color:var(--muted);margin-top:3px}
  .tag{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;margin-top:6px;display:inline-block;margin-right:5px}
  .tag.ok{background:#132a20;color:var(--green)}.tag.warn{background:#2e2513;color:var(--amber)}
  .tag.late{background:#2a1a1a;color:var(--red)}.tag.who{background:#132030;color:var(--blue)}
  .progressbar{height:8px;background:var(--panel2);border-radius:8px;overflow:hidden;margin-top:8px}
  .progressbar>div{height:100%;background:linear-gradient(90deg,var(--yellow),var(--yellow2))}
  .btn{background:var(--yellow);color:#111;font-weight:700;padding:11px 16px;border-radius:12px}
  .btn.ghost{background:var(--panel2);color:var(--txt);border:1px solid var(--line)}
  .btn.sm{padding:7px 12px;font-size:13px;border-radius:10px}
  .btn.danger{background:#3a1e1e;color:var(--red);border:1px solid #5a2b2b}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
  .field input,.field select,.field textarea{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:11px 12px;border-radius:10px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .chkline{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;margin-bottom:6px;cursor:pointer}
  .chkline input{width:auto}.chkline.on{border-color:var(--yellow)}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:50;display:flex;align-items:flex-end;justify-content:center}
  @media(min-width:640px){.modal{align-items:center;padding:20px}}
  .modal .sheet{background:var(--panel);border:1px solid var(--line);border-radius:20px 20px 0 0;width:100%;max-width:520px;padding:20px;max-height:92vh;overflow:auto}
  @media(min-width:640px){.modal .sheet{border-radius:20px}}
  .modal h3{margin:0 0 16px}
  .bottomnav{position:fixed;bottom:0;left:0;right:0;z-index:30;background:rgba(15,15,15,.96);backdrop-filter:blur(10px);border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:8px 2px 10px;max-width:1100px;margin:0 auto}
  .bottomnav button{background:none;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9.5px;font-weight:600;padding:4px 4px;border-radius:10px;flex:1;min-width:0}
  .bottomnav button .ic{font-size:18px;line-height:1}
  .bottomnav button.active{color:var(--yellow)}
  .note{background:#1a1808;border:1px solid #3a3208;color:#e6d98f;font-size:12.5px;padding:10px 12px;border-radius:12px;margin-bottom:14px}
  .empty{color:var(--muted);text-align:center;padding:30px 10px}
  .chartbox{position:relative;height:230px}
  .flexbtns{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
</style>
</head>
<body>

<div id="login">
  <div class="logomark" id="loginLogo"></div>
  <div class="tagline">Panel interno</div>
  <div id="whoStep"><div class="who" id="whoList"></div></div>
  <div id="pinPad" class="hidden">
    <div class="avatar" id="pinAvatar" style="margin:0 auto 10px;width:52px;height:52px;font-size:18px"></div>
    <h3 id="pinName"></h3><p id="pinRole"></p>
    <div class="pindots"><div class="pindot"></div><div class="pindot"></div><div class="pindot"></div><div class="pindot"></div></div>
    <div class="err" id="pinErr"></div>
    <div class="keys" id="keys"></div>
    <button class="link" id="backWho">← Elegir otra persona</button>
  </div>
</div>

<div id="app" class="hidden">
  <div class="topbar">
    <div class="logomark" id="topLogo"></div><div class="spacer"></div>
    <button class="iconbtn" id="syncBtn" title="Sincronizar con el Excel">↻</button>
    <button class="iconbtn hidden" id="gearBtn" title="Ajustes">⚙</button>
    <div class="userchip"><div class="avatar" id="uAvatar"></div><span id="uName"></span><span class="roletag" id="uRole"></span></div>
    <button class="iconbtn" id="logoutBtn" title="Salir">⏻</button>
  </div>
  <main id="view"></main>
  <div class="bottomnav hidden" id="nav"></div>
</div>
<div id="modalRoot"></div>

window.OneSignalDeferred=window.OneSignalDeferred||[];
function initPush(){if(!ONESIGNAL_APP_ID)return;window.OneSignalDeferred.push(async function(O){try{
  await O.init({appId:ONESIGNAL_APP_ID, allowLocalhostAsSecureOrigin:true,
    serviceWorkerPath:"sw.js", serviceWorkerParam:{scope:"./"}})
}catch(e){}})}
function pushLoginEmpleado(id){if(!ONESIGNAL_APP_ID)return;window.OneSignalDeferred.push(function(O){try{O.login(id)}catch(e){}})}
function pushLogout(){if(!ONESIGNAL_APP_ID)return;window.OneSignalDeferred.push(function(O){try{O.logout()}catch(e){}})}
function pedirPermisoPush(){
  if(!ONESIGNAL_APP_ID){alert("Falta configurar OneSignal (App ID).");return}
  if(!("Notification" in window)){alert("Este navegador no soporta notificaciones.");return}
  const esIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  const instalada=window.matchMedia("(display-mode: standalone)").matches||window.navigator.standalone===true;
  if(esIOS&&!instalada){
    alert("📱 En iPhone primero tenés que instalar la app:\n\n1) Tocá el botón Compartir (el cuadrado con la flecha hacia arriba)\n2) Elegí \"Agregar a pantalla de inicio\"\n3) Abrí DepoApp desde ese ícono nuevo\n4) Volvé a tocar \"Activar notificaciones\"\n\nEs una limitación de Apple, no de la app.");
    return;
  }
  if(Notification.permission==="granted"){alert("🔔 Ya tenés las notificaciones activadas.");return}
  if(Notification.permission==="denied"){
    alert("🔕 Las notificaciones están bloqueadas para este sitio.\n\nTocá el candado (o los 3 puntos) al lado de la dirección web, entrá a Permisos y activá Notificaciones. Después volvé a probar.");
    return;
  }
  window.OneSignalDeferred.push(async function(O){
    try{
      await O.Notifications.requestPermission();
      setTimeout(function(){
        if(Notification.permission==="granted")alert("✅ ¡Listo! Te vamos a avisar cuando tengas un partido nuevo o algún cambio.");
        else alert("No quedaron activadas. Volvé a tocar el botón y elegí \"Permitir\".");
      },1000);
    }catch(e){alert("No se pudieron activar.\n\nDetalle: "+(e&&e.message?e.message:e));}
  });
}

   backend de Apps Script. Cuando se asigna o cambia un partido, el backend

const BACKEND_URL="https://script.google.com/macros/s/AKfycbxYQIv9vEMSLUcmOsoZcdFC9laPOQTmT2QofrecfAqN0JJRfnYFffQ8KpdUpkG-YOfgaw/exec";

const _sa=s=>String(s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toUpperCase().trim();
function clubCanonico(nombre){if(!nombre)return nombre;var m=ST.clubes.find(c=>_sa(c.club)===_sa(nombre));return m?m.club:nombre;}
function hoyISO(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}

/* "ENZO NUÑEZ" -> "enzo"  ·  "GASTON CHECHI" -> "jefe" */
function empIdPorNombre(txt){
  const t=_sa(txt); if(!t) return "";
  if(t.indexOf("GASTON")>-1) return "jefe";
  const e=ST.empleados.find(e=>_sa(e.nombre).split(" ").some(w=>w.length>2&&t.indexOf(w)>-1));
  return e?e.id:"";
}
function nombrePorEmpId(id){
  if(id==="jefe") return "GASTON CHECHI";

/* Mezcla lo que viene del Excel con lo que ya hay en la app (match por id) */
function aplicarRemotos(lista){
  const porId={}; ST.partidos.forEach(p=>{if(p.id)porId[p.id]=p});
  const hoy=hoyISO(); let nuevos=0,cambios=0;
  /* Solo trae partidos desde el mes en curso para adelante (no todo el historial viejo) */
  const desde=(ST.config.desdeFecha)||(hoy.slice(0,7)+"-01");
  (lista||[]).forEach(r=>{
    if(!r.id||!r.fecha) return;
    if(String(r.fecha)<desde && !porId[r.id]) return;
    const emp=empIdPorNombre(r.emp);
    const base=porId[r.id];
    const editor=empIdPorNombre(r.editor)||editorDe(emp);
    if(base){
      if(base.fecha!==r.fecha||base.hora!==r.hora||base.cancha!==r.cancha||base.emp!==emp) cambios++;
      Object.assign(base,{fecha:r.fecha,hora:r.hora,cancha:r.cancha,club:clubCanonico(r.club),cat:r.cat,
        precio:r.precio,emp:emp,editor:editor,edi:r.edi,todo:!!r.todo,pagado:r.pagado});
    }else{
      ST.partidos.push({id:r.id,fecha:r.fecha,hora:r.hora,cancha:r.cancha,club:clubCanonico(r.club),cat:r.cat,
        precio:r.precio,emp:emp,editor:editor,edi:r.edi,todo:!!r.todo,pagado:r.pagado,
        estado:r.fecha<hoy?"entreg":"prox",club2:"",precio2:0,cerro:""});
      nuevos++;
    }
  });
  return{nuevos,cambios};
}

async function sincronizar(silencioso){
  try{
    const r=await fetch(BACKEND_URL+"?action=partidos&token="+encodeURIComponent(BACKEND_TOKEN));
    const d=await r.json();
    if(!d.ok) throw new Error(d.error||"respuesta inválida");
    const res=aplicarRemotos(d.partidos);
    saveState(); SYNC_OK=true;
    SYNC_MSG="Excel sincronizado "+new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"});
    if(!silencioso){
      if(SESSION && SESSION.role==="empleado"){ alert("✅ Actualizado"); }
      else { alert("✅ Sincronizado con el Excel\n\n"+d.total+" partidos leídos\nNuevos: "+res.nuevos+"\nActualizados: "+res.cambios); }
      refrescarVista();
    }else if(res.nuevos+res.cambios>0){ refrescarVista() }
  }catch(e){
    SYNC_OK=false; SYNC_MSG="Sin conexión con el Excel";
    if(!silencioso) alert("No pude sincronizar.\n\n"+e.message);
  }
}

/* Tramo del club: chico (1 a 3 categorías) o grande (4 o más) */
function tramoClub(club){
  const c=ST.clubes.find(x=>_sa(x.club)===_sa(club));
  const n=(c&&c.cats)?c.cats.length:1;
  return n>=(+ST.precios.catsTramoGrande||4)?"grande":"chico";

/* Cuántos partidos hay ese mismo día en esa misma cancha (comparten viaje) */
function juntosEseDia(p){
  const n=ST.partidos.filter(x=>x.fecha===p.fecha&&_sa(x.cancha)===_sa(p.cancha)&&_sa(x.club)===_sa(p.club)).length;
  return Math.max(n,1);
}

/* Precio que le corresponde al cliente — sale solo de la tabla */
function precioSugerido(p){
  const P=ST.precios, tr=tramoClub(p.club), modo=p.todo?"todo":"local";
  const i=Math.min(juntosEseDia(p),3)-1;
  const fila=(P[tr]&&P[tr][modo])||[0,0,0];
  const base=+fila[i]||0;
  const resumen=p.edi?(p.todo?(+P.resumenTodo||0):(+P.resumenLocal||0)):0;
  return{base,resumen,total:base+resumen,tramo:tr,juntos:i+1};
}

/* ¿La cancha es de las lejanas? (se configura en Ajustes) */
function esLejana(cancha){
  const n=_sa(cancha); if(!n) return false;
  return (ST.config.canchasLejanas||[]).some(x=>{const y=_sa(x);return y&&n.indexOf(y)>-1});
}

/* Liquidación de un empleado en el mes — se calcula sola, no se toca nada a mano */
function liquidacion(empId,ym){
  ym=ym||"2026-07";
  const e=empById(empId)||{},t=ST.tarifas;
  const delMes=x=>x.fecha&&String(x.fecha).startsWith(ym);

  /* Filmación */
  const mios=ST.partidos.filter(p=>p.emp===empId&&delMes(p));
  const filmacion=mios.length*(+t.porPartido||0);

  /* Fotos */
  const fotos=(ST.fotos||[]).filter(f=>f.fotografo===empId&&delMes(f));
  const fotoPago=fotos.length*(+t.fotoPorSesion||0);

  /* Transporte: UNA vez por día, sume filmación y/o fotos ese día */
  const dias={};
  mios.forEach(p=>{(dias[p.fecha]=dias[p.fecha]||[]).push(p.cancha)});
  fotos.forEach(f=>{(dias[f.fecha]=dias[f.fecha]||[]).push(f.cancha)});
  const salidas=Object.keys(dias).length;
  let plusLejana=0;
  Object.values(dias).forEach(canchas=>{
    if(canchas.some(esLejana)) plusLejana+=(+t.plusLejana||0);
  });
  const transporte=salidas*(+t.transporte||0)+plusLejana;

  /* Edición */
  const editados=ST.partidos.filter(p=>p.editor===empId&&delMes(p));
  const edicion=editados.length*(+t.edicion||0);

  /* Redes: único fijo que queda */
  const redes=(e.roles&&e.roles.redes)?(+t.redes||0):0;

  /* Comisión por cerrar el 2º equipo */
  const cerrados=ST.partidos.filter(p=>p.cerro===empId&&delMes(p));
  const comision=Math.round(cerrados.reduce((a,p)=>a+(+p.precio2||0)*(+t.comisionPct||0)/100,0));

  return{
    partidos:mios.length, filmacion,
    salidas, plusLejana, transporte,
    nEdit:editados.length, edicion,
    nFotos:fotos.length, fotoPago,
    redes, comision,
    total:filmacion+transporte+edicion+fotoPago+redes+comision
  };
}

function filasLiq(L){
  const f=[];
  if(L.partidos) f.push([L.partidos+" partidos filmados", L.filmacion]);
  if(L.nFotos)   f.push([L.nFotos+" sesiones de fotos",   L.fotoPago]);
  if(L.salidas)  f.push([L.salidas+" salidas"+(L.plusLejana?" (+ cancha lejana)":""), L.transporte]);

  if(L.redes)    f.push(["Redes",                          L.redes]);
  if(L.comision) f.push(["Comisiones 2º equipo",           L.comision]);

}

function imagenLiquidacion(ym, soloEmp){
  const BG="#0f0f0f", CARD="#1a1a1a", AM="#ffd21e", TX="#f2f2f2", MU="#8f8f8f";
  const lista=ST.empleados.filter(e=>e.activo!==false&&(!soloEmp||e.id===soloEmp))
    .map(e=>({e,L:liquidacion(e.id,ym),f:filasLiq(liquidacion(e.id,ym))}))
    .filter(x=>x.L.total>0);
  if(!lista.length){alert("No hay nada para liquidar en ese mes.");return}

  const W=880, P=34;
  let H=132;
  lista.forEach(d=>{ H += 44 + d.f.length*31 + 48 + 16 });
  H += soloEmp?40:96;

  const c=document.createElement("canvas"), k=2;
  c.width=W*k; c.height=H*k;
  const g=c.getContext("2d"); g.scale(k,k);

  const mesTxt=(()=>{const [a,m]=ym.split("-");return MESN[+m-1].toUpperCase()+" "+a})();
  const num=n=>"$"+Math.round(n||0).toLocaleString("es-AR");

  g.fillStyle=BG; g.fillRect(0,0,W,H);

  /* encabezado */
  g.fillStyle=AM; g.fillRect(0,0,W,6);
  g.fillStyle=TX; g.font="700 30px system-ui,sans-serif";
  g.fillText("DepoFilms", P, 56);
  g.fillStyle=AM; g.font="700 18px system-ui,sans-serif";
  g.fillText("Liquidación · "+mesTxt, P, 84);
  g.fillStyle=MU; g.font="13px system-ui,sans-serif";
  g.fillText("Generado el "+new Date().toLocaleDateString("es-AR"), P, 106);

  let y=132, granTotal=0;
  lista.forEach(d=>{
    const altura=44+d.f.length*31+48;
    g.fillStyle=CARD; g.beginPath(); g.roundRect(P,y,W-P*2,altura,14); g.fill();

    g.fillStyle=TX; g.font="700 19px system-ui,sans-serif";
    g.fillText(d.e.nombre, P+22, y+32);

    let ly=y+62;
    d.f.forEach(([txt,val])=>{
      g.fillStyle=MU; g.font="15px system-ui,sans-serif";
      g.fillText(txt, P+22, ly);
      g.fillStyle=TX; g.font="15px system-ui,sans-serif";
      g.textAlign="right"; g.fillText(num(val), W-P-22, ly); g.textAlign="left";
      ly+=31;
    });

    g.strokeStyle="#333"; g.lineWidth=1; g.beginPath();
    g.moveTo(P+22,ly-12); g.lineTo(W-P-22,ly-12); g.stroke();

    g.fillStyle=TX; g.font="700 17px system-ui,sans-serif";
    g.fillText("Total", P+22, ly+16);
    g.fillStyle=AM; g.font="700 21px system-ui,sans-serif";
    g.textAlign="right"; g.fillText(num(d.L.total), W-P-22, ly+16); g.textAlign="left";

    granTotal+=d.L.total;
    y+=altura+16;
  });

  if(!soloEmp){
    g.fillStyle=AM; g.beginPath(); g.roundRect(P,y,W-P*2,64,14); g.fill();
    g.fillStyle="#0f0f0f"; g.font="700 20px system-ui,sans-serif";
    g.fillText("TOTAL A PAGAR", P+22, y+40);
    g.font="700 26px system-ui,sans-serif";
    g.textAlign="right"; g.fillText(num(granTotal), W-P-22, y+41); g.textAlign="left";
  }

  const nombre="liquidacion-"+(soloEmp?soloEmp+"-":"")+ym+".png";
  c.toBlob(function(b){
    const url=URL.createObjectURL(b);
    openModal('<h3>Liquidación '+mesTxt+'</h3>'+
      '<img src="'+url+'" style="width:100%;border-radius:12px;display:block">'+
      '<div class="note" style="margin-top:10px">📲 En el celular: mantené apretada la imagen para guardarla o compartirla por WhatsApp.</div>'+
      '<div class="flexbtns" style="margin-top:12px">'+
      '<a class="btn" href="'+url+'" download="'+nombre+'">Descargar</a>'+
      '<button class="btn ghost" onclick="closeModal()">Cerrar</button></div>');
  },"image/png");
}

function submitPin(){
  if(pinBuf.length<4)return;
  if(pinMode==="create"){
    if(!pinFirst){pinFirst=pinBuf;pinBuf="";updateDots();$("#pinRole").textContent="Repetí el PIN";return}
    if(pinBuf===pinFirst){ST.pins[pinTarget.emp.id]=hashPin(pinBuf);saveState();SESSION={emp:pinTarget.emp,role:"empleado"};enterApp()}
    else{$("#pinErr").textContent="No coincide";pinFirst="";pinBuf="";updateDots();$("#pinRole").textContent="Creá tu PIN de 4 dígitos"}

/* Achica la foto a un cuadrado chico para que no pese */
function redimFoto(dataUrl,size,cb){const im=new Image();im.onload=()=>{const c=document.createElement("canvas");c.width=size;c.height=size;const g=c.getContext("2d");const m=Math.min(im.width,im.height);g.drawImage(im,(im.width-m)/2,(im.height-m)/2,m,m,0,0,size,size);cb(c.toDataURL("image/jpeg",0.82))};im.src=dataUrl;}

    c.parentElement.classList.toggle("on",c.checked)});
  $("#oSave").onclick=()=>{const t=$("#oT").value.trim();if(!t)return;
    const para=forEmp?[forEmp]:([...$("#oWho").querySelectorAll("input:checked")].map(x=>x.value));if(!para.length)para.push("todos");

function bindClubs(z){

  z.querySelectorAll("[data-eclub]").forEach(b=>b.onclick=()=>clubModal(+b.dataset.eclub));

/* ===================== PARTIDOS ===================== */
function viewAsignaciones(v){
  const rows=[...ST.partidos].sort((a,b)=>a.fecha<b.fecha?1:-1);
  const fact=rows.reduce((a,p)=>a+totalPartido(p),0);
  const cob=rows.filter(p=>p.pagado).reduce((a,p)=>a+totalPartido(p),0);
  v.innerHTML=`<div class="pagetitle">Partidos <small>Anotá, asigná, marcá pagos y el 2º equipo</small></div>
    <div class="note">💰 Facturado ${money(fact)} · cobrado ${money(cob)} · <b>pendiente ${money(fact-cob)}</b>. Tocá una fila para editar.</div>
    <div class="flexbtns" style="margin-bottom:12px"><button class="btn sm" id="addP">+ Anotar partido</button></div>
    <div class="tablewrap"><table><thead><tr><th>Fecha</th><th>Club / Cat.</th><th>Empleado</th><th>2º equipo</th><th class="num">Total</th><th>Pago</th></tr></thead><tbody>
    ${rows.map(p=>{const e=empById(p.emp),i=ST.partidos.indexOf(p);
      return `<tr class="clk" data-ep="${i}"><td>${fdLong(p.fecha)}<br><span style="color:var(--muted);font-size:11.5px">${p.hora}</span></td>
      <td><b>${p.club}</b><br><span style="color:var(--muted);font-size:12px">${p.cat}</span></td>
      <td>${e?e.nombre.split(" ")[0]:'<span style="color:var(--red)">—</span>'}${p.nuevo?' 🔔':''}</td>
      <td>${p.club2?`<span class="pill comp">${p.club2}</span>`:'<span style="color:var(--muted)">—</span>'}</td>
      <td class="num">${money(totalPartido(p))}</td>
      <td><span class="badge ${p.pagado?'si':'no'}">${p.pagado?'PAGÓ':'DEBE'}</span></td></tr>`}).join("")}
    </tbody></table></div>`;
  v.querySelectorAll("[data-ep]").forEach(r=>r.onclick=()=>partidoModal(+r.dataset.ep));
  $("#addP").onclick=()=>partidoModal(null);
}
function partidoModal(idx){
  const nuevo=idx==null;
  const p=nuevo?{fecha:"2026-07-25",hora:"21:00",cancha:"",club:"",cat:"",emp:"",editor:"",edi:false,todo:false,estado:"prox",precio:0,pagado:false,club2:"",precio2:0,cerro:""}:ST.partidos[idx];
  const clubs=ST.clubes.filter(c=>c.estado!=="INACTIVO");
  openModal(`<h3>${nuevo?'Anotar partido':'Editar partido'}</h3>
  <div class="row2"><div class="field"><label>Fecha</label><input id="pF" type="date" value="${p.fecha}"></div>
  <div class="field"><label>Hora</label><input id="pH" value="${p.hora}"></div></div>
  <div class="field"><label>Club</label><select id="pClub"><option value="">— elegir —</option>${clubs.map(c=>`<option ${_sa(c.club)===_sa(p.club)?'selected':''}>${c.club}</option>`).join("")}</select></div>
  <div class="field"><label>Categoría</label><select id="pCat"></select></div>
  <div class="row2"><div class="field"><label>Cancha</label><input id="pCancha" value="${p.cancha}"></div>
  <div class="field"><label>Camarógrafo</label><select id="pEmp"><option value="">Sin asignar</option>${ST.empleados.filter(e=>e.activo!==false).map(e=>`<option value="${e.id}" ${e.id===p.emp?'selected':''}>${e.nombre}</option>`).join("")}</select></div></div>
  <label class="chkline ${p.todo?'on':''}"><input type="checkbox" id="pTodo" ${p.todo?'checked':''}> 🚌 Filma local y visitante</label>
  <label class="chkline ${p.edi?'on':''}"><input type="checkbox" id="pEdi" ${p.edi?'checked':''}> ✂️ Lleva resumen</label>
  <div class="row2"><div class="field"><label>Precio</label><input id="pPrecio" type="number" value="${p.precio}"></div>
  <div class="field"><label>Estado</label><select id="pEst">${[["prox","Próximo"],["film","Filmado"],["entreg","Entregado"]].map(x=>`<option value="${x[0]}" ${x[0]===p.estado?'selected':''}>${x[1]}</option>`).join("")}</select></div></div>
  <label class="chkline ${p.pagado?'on':''}"><input type="checkbox" id="pPag" ${p.pagado?'checked':''}> 💰 Ya pagaron</label>
  <div class="note" id="pInfo" style="margin-top:10px"></div>
  <button class="btn sm ghost" id="pMasBtn" style="margin:10px 0 4px">⚙ Más opciones ▾</button>
  <div id="pMas" style="display:none">
    <div class="field"><label>Editó (se completa solo)</label><select id="pEditor"><option value="">Sin asignar</option>${ST.empleados.filter(e=>e.activo!==false&&e.roles&&e.roles.editor).map(e=>`<option value="${e.id}" ${e.id===p.editor?'selected':''}>${e.nombre}</option>`).join("")}</select></div>
    <button class="btn sm ghost" id="pAuto" style="margin-bottom:10px">↻ Recalcular precio</button>
    <div class="sectitle" style="margin:10px 0 8px">🤝 Segundo equipo (compartido)</div>
    <div class="row2"><div class="field"><label>Rival que también paga</label><input id="pClub2" value="${p.club2||''}" placeholder="Nombre del rival"></div>
    <div class="field"><label>Precio (club 2)</label><input id="pPrecio2" type="number" value="${p.precio2||0}"></div></div>
    <div class="field"><label>¿Quién lo cerró? (comisión ${ST.tarifas.comisionPct}%)</label>
    <select id="pCerro"><option value="">Nadie / lo cerré yo</option>${ST.empleados.map(e=>`<option value="${e.id}" ${e.id===p.cerro?'selected':''}>${e.nombre}</option>`).join("")}</select></div>
  </div>
  <div class="flexbtns"><button class="btn" id="pSave">Guardar</button><button class="btn ghost" onclick="closeModal()">Cancelar</button>
  ${nuevo?'':'<button class="btn danger" id="pDel">Borrar</button>'}</div>`);
  function fillCats(sel){
    const c=ST.clubes.find(x=>x.club===$("#pClub").value),cats=c?c.cats:[];
    $("#pCat").innerHTML='<option value="">— elegir —</option>'+cats.map(ct=>`<option ${ct.cat===sel?'selected':''}>${ct.cat}</option>`).join("");
    sync()}
  function datosActuales(){
    return{fecha:$("#pF").value,cancha:$("#pCancha").value.trim(),club:$("#pClub").value,
      todo:$("#pTodo").checked,edi:$("#pEdi").checked};
  }
  function sugerir(){
    const d=datosActuales(); if(!d.club) return null;
    return precioSugerido(d);
  }
  function aplicarPrecio(){
    const g=sugerir(); if(!g)return;
    $("#pPrecio").value=g.total; sync();
  }
  function sync(){
    const c=ST.clubes.find(x=>x.club===$("#pClub").value);
    const ct=c&&c.cats.find(x=>x.cat===$("#pCat").value);
    if(ct&&ct.cancha&&ct.cancha!=='—'&&!$("#pCancha").value)$("#pCancha").value=ct.cancha;
    const p1=+$("#pPrecio").value||0,p2=+$("#pPrecio2").value||0;
    const g=sugerir();
    let txt=`Total del partido: <b>${money(p1+p2)}</b>`;
    if(g){
      txt+=` · Tramo <b>${g.tramo}</b>`+(g.juntos>1?` · ${g.juntos} el mismo día`:'')+
        ` → sugerido <b style="color:var(--yellow)">${money(g.total)}</b>`+
        (g.resumen?` (${money(g.base)} + ${money(g.resumen)} de resumen)`:'');
      if(p1&&p1!==g.total) txt+=` · ⚠️ cargaste ${money(p1)}`;
    }
    if(c) txt+= c.comparte?` · 🤝 ${c.club} autoriza compartir: ${money(pctCompartido(p1))} cada uno.`:` · ⚠️ ${c.club} NO autorizó compartir.`;
    $("#pInfo").innerHTML=txt;
  }
  $("#pClub").onchange=()=>{fillCats(null);aplicarPrecio()};
  $("#pEmp").onchange=()=>{const e=editorDe($("#pEmp").value); if(e)$("#pEditor").value=e};
  $("#pCat").onchange=sync;$("#pPrecio").oninput=sync;$("#pPrecio2").oninput=sync;
  $("#pF").onchange=sync;$("#pCancha").oninput=sync;
  ["pPag","pTodo","pEdi"].forEach(id=>$("#"+id).onchange=e=>{
    e.target.parentElement.classList.toggle("on",e.target.checked);
    if(id!=="pPag")aplicarPrecio();
  });
  $("#pMasBtn").onclick=()=>{const m=$("#pMas");const ab=m.style.display==="none";m.style.display=ab?"block":"none";$("#pMasBtn").textContent=ab?"⚙ Menos opciones ▴":"⚙ Más opciones ▾"};
  $("#pAuto").onclick=aplicarPrecio;
  fillCats(p.cat);
  if(nuevo)aplicarPrecio();
  $("#pSave").onclick=()=>{
    const c=ST.clubes.find(x=>x.club===$("#pClub").value);
    const ct=c&&c.cats.find(x=>x.cat===$("#pCat").value);
    if(!c||!ct){alert("Elegí club y categoría");return}
    const d={fecha:$("#pF").value,hora:$("#pH").value.trim(),cancha:$("#pCancha").value.trim(),club:c.club,cat:ct.cat,
      emp:$("#pEmp").value,editor:$("#pEditor").value||editorDe($("#pEmp").value),
      edi:$("#pEdi").checked,todo:$("#pTodo").checked,
      estado:$("#pEst").value,precio:+$("#pPrecio").value||0,
      club2:$("#pClub2").value.trim(),precio2:+$("#pPrecio2").value||0,cerro:$("#pCerro").value,
      pagado:$("#pPag").checked,nuevo:true};
    let dest;
    if(nuevo){ d.id="DA"+Date.now(); ST.partidos.push(d); dest=d }
    else { Object.assign(p,d); if(!p.id)p.id="DA"+Date.now(); dest=p }
    saveState();closeModal();go("asignaciones");
    guardarEnExcel(dest).then(r=>{
      if(!r||!r.ok) alert("Guardado en la app, pero no pude escribirlo en el Excel.\nSe reintenta al sincronizar.");
      else if(dest.emp && r.push && r.push!=="enviado") console.warn("push:",r.push);
    });};
  if(!nuevo)$("#pDel").onclick=()=>{if(confirm("¿Borrar partido?")){ST.partidos.splice(idx,1);saveState();closeModal();go("asignaciones")}};
}

    else Object.assign(e,d);
    saveState();closeModal();go("equipo")};
  if(!nuevo)$("#eDel").onclick=()=>{if(confirm("¿Borrar a "+e.nombre+"? Se pierden sus datos.")){ST.empleados.splice(idx,1);saveState();closeModal();go("equipo")}};
}

/* ===================== AJUSTES ===================== */
function ajustesModal(){
  const t=ST.tarifas,c=ST.config;
  openModal(`<h3>⚙ Ajustes</h3>
  <div class="sectitle" style="margin-top:0">Cuánto pagás</div>
  <div class="row2"><div class="field"><label>Filmación (por partido)</label><input id="aPP" type="number" value="${t.porPartido}"></div>
  <div class="field"><label>Edición (por partido)</label><input id="aEd" type="number" value="${t.edicion}"></div></div>
  <div class="row2"><div class="field"><label>Transporte (por salida)</label><input id="aTr" type="number" value="${t.transporte}"></div>
  <div class="field"><label>Plus cancha lejana</label><input id="aLej" type="number" value="${t.plusLejana}"></div></div>
  <div class="row2"><div class="field"><label>Fotos (por sesión)</label><input id="aFot" type="number" value="${t.fotoPorSesion}"></div>
  <div class="field"><label>Redes (fijo mensual)</label><input id="aRe" type="number" value="${t.redes}"></div></div>
  <div class="field"><label>Comisión por cerrar 2º equipo (% de lo que paga)</label><input id="aCom" type="number" value="${t.comisionPct}"></div>
  <div class="field"><label>Canchas lejanas (una por línea, cobran el plus)</label>
  <textarea id="aCanchas" rows="4" style="width:100%">${(c.canchasLejanas||[]).join("\n")}</textarea></div>
  <div class="sectitle">Quién edita lo de cada uno</div>
  <div id="aEditores">${ST.empleados.filter(e=>e.activo!==false&&e.roles&&e.roles.camara).map(e=>`
    <div class="chkline" style="cursor:default"><span style="flex:1">${e.nombre}</span>
    <select data-ed="${e.id}" style="max-width:160px"><option value="">— nadie —</option>
    ${ST.empleados.filter(x=>x.roles&&x.roles.editor).map(x=>`<option value="${x.id}" ${((c.editorPorCamara||{})[e.id]===x.id)?'selected':''}>${x.nombre}</option>`).join("")}
    </select></div>`).join("")}</div>
  <div class="sectitle">Porcentajes comerciales</div>
  <div class="row2"><div class="field"><label>Aumento a aplicar (%)</label><input id="cAum" type="number" value="${c.aumentoPct}"></div>
  <div class="field"><label>Precio compartido (% del individual)</label><input id="cComp" type="number" value="${c.compartidoPct}"></div></div>
  <div class="field"><label>Descuento por abono prepago (%)</label><input id="cDesc" type="number" value="${c.descuentoAbonoPct}"></div>
  <button class="btn sm" id="aSave">Guardar todo</button>
  <div class="sectitle">PIN</div>
  <button class="btn sm ghost" id="aChg">Cambiar mi PIN</button>
  <div id="aPins" style="margin-top:10px">${ST.empleados.map(e=>`<div class="chkline" style="cursor:default"><span style="flex:1">${e.nombre}</span>
    <span style="color:${ST.pins[e.id]?'var(--green)':'var(--muted)'};font-size:12px">${ST.pins[e.id]?'PIN activo':'sin PIN'}</span>
    ${ST.pins[e.id]?`<button class="btn sm danger" data-rp="${e.id}">Resetear</button>`:''}</div>`).join("")}</div>
  <div class="flexbtns" style="margin-top:16px"><button class="btn ghost" onclick="closeModal()">Cerrar</button>
  <button class="btn danger" id="aReset">Borrar todo y volver al inicio</button></div>`);
  $("#aSave").onclick=()=>{
    ST.tarifas={v:TARIFAS_DEF.v,porPartido:+$("#aPP").value||0,edicion:+$("#aEd").value||0,transporte:+$("#aTr").value||0,
      plusLejana:+$("#aLej").value||0,fotoPorSesion:+$("#aFot").value||0,redes:+$("#aRe").value||0,
      comisionPct:+$("#aCom").value||0};
    ST.config={aumentoPct:+$("#cAum").value||0,compartidoPct:+$("#cComp").value||70,descuentoAbonoPct:+$("#cDesc").value||0,
      canchasLejanas:$("#aCanchas").value.split("\n").map(x=>x.trim()).filter(Boolean),
      editorPorCamara:(function(){const m={};$("#aEditores").querySelectorAll("[data-ed]").forEach(sel=>{if(sel.value)m[sel.dataset.ed]=sel.value});return m})()};
    saveState();$("#aSave").textContent="✓ Guardado"};
  $("#aChg").onclick=()=>changePinModal("jefe");
  $("#aPins").querySelectorAll("[data-rp]").forEach(b=>b.onclick=()=>{if(confirm("¿Resetear PIN?")){delete ST.pins[b.dataset.rp];saveState();ajustesModal()}});
  $("#aReset").onclick=()=>{if(confirm("Borra TODO lo cargado y vuelve a los datos iniciales. ¿Seguro?")){const p=ST.pins;localStorage.removeItem(LS_KEY);ST=loadState();ST.pins=p;saveState();closeModal();go("resumen")}};
}
function changePinModal(uidT){
  openModal(`<h3>Cambiar PIN</h3><div class="field"><label>Nuevo PIN (4 dígitos)</label><input id="np1" type="tel" maxlength="4" inputmode="numeric"></div>
  <div class="field"><label>Repetir</label><input id="np2" type="tel" maxlength="4" inputmode="numeric"></div><div class="err" id="npE"></div>
  <div class="flexbtns"><button class="btn" id="npS">Guardar</button><button class="btn ghost" onclick="closeModal()">Cancelar</button></div>`);
  $("#npS").onclick=()=>{const a=$("#np1").value,b=$("#np2").value;
    if(!/^\d{4}$/.test(a)){$("#npE").textContent="Deben ser 4 dígitos";return}
    if(a!==b){$("#npE").textContent="No coinciden";return}
    ST.pins[uidT]=hashPin(a);saveState();closeModal()};
}

/* ===================== CHARTS ===================== */
const YEL="#ffd21e",GREEN="#3ecf8e",RED="#ff5c5c",BLUE="#5b9dff",MUT="#8f8f8f";
Chart.defaults.color=MUT;Chart.defaults.borderColor="#2a2a2a";
function drawMes(id,F){if(!F.meses.length)return;new Chart($("#"+id),{type:"bar",data:{labels:F.meses.map(m=>m.label),
  datasets:[{label:"Ingresos",data:F.meses.map(m=>m.ing),backgroundColor:GREEN,borderRadius:5},{label:"Egresos",data:F.meses.map(m=>m.egr),backgroundColor:RED,borderRadius:5}]},options:opt()})}
function drawNeto(id,F){if(!F.meses.length)return;const n=F.meses.map(m=>m.ing-m.egr);
  new Chart($("#"+id),{type:"bar",data:{labels:F.meses.map(m=>m.label),datasets:[{label:"Neto",data:n,backgroundColor:n.map(x=>x>=0?GREEN:RED),borderRadius:5}]},options:opt(false)})}
function drawCat(id,F){if(!F.cats.length){$("#"+id).parentElement.innerHTML='<div class="empty">Sin egresos cargados</div>';return}
  new Chart($("#"+id),{type:"doughnut",data:{labels:F.cats.map(c=>c.cat),datasets:[{data:F.cats.map(c=>c.val),backgroundColor:[YEL,"#ffe06b",BLUE,GREEN,RED,MUT,"#c88bff"],borderWidth:0}]},
    options:{maintainAspectRatio:false,plugins:{legend:{position:"right",labels:{boxWidth:12,font:{size:11}}}}}})}
function opt(leg=true){return{maintainAspectRatio:false,plugins:{legend:{display:leg,position:"bottom",labels:{boxWidth:12}}},
  scales:{y:{ticks:{callback:v=>"$"+(v/1e6).toFixed(1)+"M"}}}}}

/* ===================== MODAL ===================== */
function openModal(h){$("#modalRoot").innerHTML=`<div class="modal" onclick="if(event.target===this)closeModal()"><div class="sheet">${h}</div></div>`}
function closeModal(){$("#modalRoot").innerHTML=""}

/* ===================== INIT ===================== */
renderWho();renderKeys();initPush();arrancarSync();
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  navigator.serviceWorker.register('sw.js').then(function(reg){
    reg.update();
    reg.addEventListener('updatefound',function(){
      var nw=reg.installing;
      nw&&nw.addEventListener('statechange',function(){
        if(nw.state==='installed'&&navigator.serviceWorker.controller){nw.postMessage('skipWaiting');}
      });
    });
  }).catch(function(){});
  var _recargado=false;
  navigator.serviceWorker.addEventListener('controllerchange',function(){
    if(_recargado)return;_recargado=true;location.reload();
  });
}
</script>
