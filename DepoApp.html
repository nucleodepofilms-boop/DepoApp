<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<title>DepoApp — DepoFilms</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="DepoApp">
<link rel="apple-touch-icon" href="icon.svg">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<style>
  :root{
    --bg:#0a0a0a; --panel:#141414; --panel2:#1c1c1c; --line:#2a2a2a;
    --txt:#f2f2f2; --muted:#8f8f8f;
    --yellow:#ffd21e; --yellow2:#ffe06b; --yellowd:#3a3208;
    --green:#3ecf8e; --red:#ff5c5c; --blue:#5b9dff; --amber:#f5b942; --purple:#c88bff;
    --radius:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--txt);font-size:15px;line-height:1.45}
  .hidden{display:none!important}
  button{font-family:inherit;cursor:pointer;border:none;outline:none}
  input,select,textarea{font-family:inherit;font-size:15px}
  ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:8px}

  .logomark{display:inline-flex;align-items:center;gap:10px}
  .logotext{font-weight:800;letter-spacing:-.5px;line-height:1}
  .logotext b{color:var(--yellow)}

  #login{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:24px;background:radial-gradient(1200px 600px at 50% -5%, #1c1a0a 0%, var(--bg) 55%)}
  #login .logomark{margin-bottom:6px}
  .tagline{color:var(--muted);margin-bottom:26px;font-size:12px;letter-spacing:3px;text-transform:uppercase}
  .who{width:100%;max-width:440px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .who button{background:var(--panel);border:1px solid var(--line);color:var(--txt);
    padding:14px 10px;border-radius:14px;font-weight:600;display:flex;flex-direction:column;gap:6px;align-items:center;transition:.15s}
  .who button:hover{border-color:var(--yellow);transform:translateY(-2px)}
  .who button.boss{grid-column:1/-1;background:linear-gradient(135deg,#2a2408,#141414);border-color:var(--yellow)}
  .avatar{width:40px;height:40px;border-radius:50%;background:var(--panel2);display:flex;align-items:center;justify-content:center;
    font-weight:800;color:var(--yellow);font-size:15px;border:1px solid var(--line)}
  .who small{color:var(--muted);font-weight:500;font-size:11.5px}
  #pinPad{width:100%;max-width:320px;text-align:center}
  #pinPad h3{margin:6px 0 2px}
  #pinPad p{color:var(--muted);margin:0 0 8px;font-size:13px}
  .pindots{display:flex;gap:12px;justify-content:center;margin:16px 0}
  .pindot{width:14px;height:14px;border-radius:50%;border:2px solid var(--line)}
  .pindot.on{background:var(--yellow);border-color:var(--yellow)}
  .keys{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .keys button{background:var(--panel);border:1px solid var(--line);color:var(--txt);height:60px;border-radius:14px;font-size:22px;font-weight:600;transition:.1s}
  .keys button:active{background:var(--yellow);color:#111}
  .keys button.wide{font-size:15px}
  .link{color:var(--muted);background:none;margin-top:14px;font-size:13px;text-decoration:underline}
  .err{color:var(--red);font-size:13px;min-height:18px;margin-top:4px}

  #app{max-width:1100px;margin:0 auto;padding-bottom:96px}
  .topbar{position:sticky;top:0;z-index:20;background:rgba(10,10,10,.9);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);padding:10px 14px;display:flex;align-items:center;gap:10px}
  .topbar .spacer{flex:1}
  .userchip{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);
    padding:5px 10px 5px 5px;border-radius:30px;font-size:13px;font-weight:600}
  .userchip .avatar{width:26px;height:26px;font-size:11px}
  .roletag{font-size:10px;text-transform:uppercase;letter-spacing:1px;padding:2px 7px;border-radius:20px;
    background:var(--yellowd);color:var(--yellow2);border:1px solid #4a3f0e}
  .roletag.emp{background:#132030;color:var(--blue);border-color:#274158}
  .iconbtn{background:var(--panel);border:1px solid var(--line);color:var(--muted);width:34px;height:34px;border-radius:10px;font-size:16px}
  .iconbtn:hover{color:var(--yellow);border-color:var(--yellow)}

  main{padding:16px}
  .pagetitle{font-size:22px;font-weight:800;margin:6px 2px 16px}
  .pagetitle small{display:block;font-size:13px;color:var(--muted);font-weight:500;margin-top:2px}
  .sectitle{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:22px 2px 10px;font-weight:700}
  .sectitle:first-child{margin-top:6px}

  .grid{display:grid;gap:12px}
  .kpis{grid-template-columns:repeat(2,1fr)}
  @media(min-width:720px){.kpis{grid-template-columns:repeat(4,1fr)}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px}
  .kpi .lbl{color:var(--muted);font-size:11.5px;text-transform:uppercase;letter-spacing:.5px}
  .kpi .val{font-size:23px;font-weight:800;margin-top:4px}
  .kpi .sub{font-size:12px;color:var(--muted);margin-top:2px}
  .val.green{color:var(--green)} .val.red{color:var(--red)} .val.gold{color:var(--yellow)}

  .phead{display:flex;gap:14px;align-items:center;background:linear-gradient(135deg,#211d08,#141414);
    border:1px solid #3a3208;border-radius:var(--radius);padding:18px}
  .phead .big{width:64px;height:64px;border-radius:50%;background:var(--panel2);border:2px solid var(--yellow);
    display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:var(--yellow)}
  .phead .n{font-size:20px;font-weight:800}
  .phead .r{color:var(--muted);font-size:13px;margin-top:2px}

  .alertbanner{display:flex;align-items:center;gap:10px;background:#2a2408;border:1px solid var(--yellow);
    border-radius:14px;padding:12px 14px;margin:14px 0;font-weight:600;font-size:14px}
  .alertbanner .x{margin-left:auto}

  .match{display:flex;gap:12px;align-items:center;background:var(--panel);border:1px solid var(--line);
    border-radius:14px;padding:12px 14px;margin-bottom:10px}
  .match.nuevo{border-color:var(--yellow);box-shadow:0 0 0 1px var(--yellow) inset}
  .match .day{width:50px;text-align:center;flex-shrink:0}
  .match .day .d{font-size:20px;font-weight:800;line-height:1}
  .match .day .m{font-size:11px;color:var(--muted);text-transform:uppercase}
  .match .info{flex:1;min-width:0}
  .match .info .club{font-weight:700}
  .match .info .meta{font-size:12.5px;color:var(--muted);margin-top:2px}
  .match .right{text-align:right;flex-shrink:0}
  .pill{display:inline-block;font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap}
  .pill.prox{background:#132030;color:var(--blue)}
  .pill.film{background:#132a20;color:var(--green)}
  .pill.entreg{background:var(--yellowd);color:var(--yellow2)}
  .pill.edi{background:#241330;color:var(--purple)}
  .pill.noedi{background:#22262e;color:var(--muted)}
  .pill.nuevo{background:var(--yellow);color:#111}

  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;font-weight:700}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .tablewrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  tr.clk{cursor:pointer}
  tr.clk:hover td{background:var(--panel2)}
  .badge{font-size:10.5px;padding:2px 8px;border-radius:20px;font-weight:700}
  .badge.activo{background:#132a20;color:var(--green)}
  .badge.riesgo{background:#2e2513;color:var(--amber)}
  .badge.inactivo{background:#2a1a1a;color:var(--red)}
  .badge.ing{background:#132a20;color:var(--green)}
  .badge.egr{background:#2a1a1a;color:var(--red)}

  .clubcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden}
  .clubhead{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer}
  .clubhead .nm{font-weight:700;flex:1}
  .clubhead .nm small{display:block;color:var(--muted);font-size:12px;font-weight:500}
  .clubhead .arw{color:var(--muted);transition:.2s;font-size:13px}
  .clubcard.open .arw{transform:rotate(90deg)}
  .clubbody{border-top:1px solid var(--line);padding:6px 14px 14px;display:none}
  .clubcard.open .clubbody{display:block}
  .catrow{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px dashed var(--line)}
  .catrow:last-child{border-bottom:none}
  .catrow .cn{flex:1;min-width:0}
  .catrow .cn small{display:block;color:var(--muted);font-size:11.5px}
  .catrow .pr{font-weight:700;color:var(--yellow);font-variant-numeric:tabular-nums}

  .obj{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;display:flex;gap:12px}
  .obj .chk{width:26px;height:26px;border-radius:8px;border:2px solid var(--line);flex-shrink:0;display:flex;
    align-items:center;justify-content:center;font-weight:800;color:#111;cursor:pointer;transition:.15s}
  .obj.done .chk{background:var(--green);border-color:var(--green)}
  .obj .body{flex:1;min-width:0}
  .obj .t{font-weight:700}
  .obj.done .t{text-decoration:line-through;color:var(--muted)}
  .obj .d{font-size:12.5px;color:var(--muted);margin-top:3px}
  .tag{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;margin-top:6px;display:inline-block;margin-right:5px}
  .tag.ok{background:#132a20;color:var(--green)}.tag.warn{background:#2e2513;color:var(--amber)}.tag.late{background:#2a1a1a;color:var(--red)}
  .tag.who{background:#132030;color:var(--blue)}
  .progressbar{height:8px;background:var(--panel2);border-radius:8px;overflow:hidden;margin-top:8px}
  .progressbar > div{height:100%;background:linear-gradient(90deg,var(--yellow),var(--yellow2))}

  .btn{background:var(--yellow);color:#111;font-weight:700;padding:11px 16px;border-radius:12px}
  .btn.ghost{background:var(--panel2);color:var(--txt);border:1px solid var(--line)}
  .btn.sm{padding:7px 12px;font-size:13px;border-radius:10px}
  .btn.danger{background:#3a1e1e;color:var(--red);border:1px solid #5a2b2b}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
  .field input,.field select,.field textarea{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:11px 12px;border-radius:10px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .chkline{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;margin-bottom:6px;cursor:pointer}
  .chkline input{width:auto}
  .chkline.on{border-color:var(--yellow)}

  .modal{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:50;display:flex;align-items:flex-end;justify-content:center}
  @media(min-width:640px){.modal{align-items:center;padding:20px}}
  .modal .sheet{background:var(--panel);border:1px solid var(--line);border-radius:20px 20px 0 0;width:100%;max-width:520px;padding:20px;max-height:92vh;overflow:auto}
  @media(min-width:640px){.modal .sheet{border-radius:20px}}
  .modal h3{margin:0 0 16px}

  .bottomnav{position:fixed;bottom:0;left:0;right:0;z-index:30;background:rgba(15,15,15,.96);backdrop-filter:blur(10px);
    border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:8px 4px 10px;max-width:1100px;margin:0 auto}
  .bottomnav button{background:none;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:4px 6px;border-radius:10px;flex:1;min-width:0}
  .bottomnav button .ic{font-size:19px;line-height:1}
  .bottomnav button.active{color:var(--yellow)}
  .note{background:#1a1808;border:1px solid #3a3208;color:#e6d98f;font-size:12.5px;padding:10px 12px;border-radius:12px;margin-bottom:14px}
  .empty{color:var(--muted);text-align:center;padding:30px 10px}
  .chartbox{position:relative;height:230px}
  .flexbtns{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
</style>
</head>

  <div class="logomark" id="loginLogo"></div>
  <div class="tagline">Panel interno</div>
  <div id="whoStep"><div class="who" id="whoList"></div></div>
  <div id="pinPad" class="hidden">
    <div class="avatar" id="pinAvatar" style="margin:0 auto 10px;width:52px;height:52px;font-size:18px"></div>

</div>

<div id="app" class="hidden">

    <div class="spacer"></div>

    <button class="iconbtn" id="logoutBtn" title="Salir">⏻</button>

  <div class="bottomnav hidden" id="nav"></div>
</div>

const ONESIGNAL_APP_ID="";

/* Identifica el celu con el id del empleado → el push le llega SOLO a él */
function pushLoginEmpleado(empId){ if(!ONESIGNAL_APP_ID)return; window.OneSignalDeferred.push(function(OneSignal){ try{OneSignal.login(empId);}catch(e){} }); }
function pushLogout(){ if(!ONESIGNAL_APP_ID)return; window.OneSignalDeferred.push(function(OneSignal){ try{OneSignal.logout();}catch(e){} }); }

const $=(s,r=document)=>r.querySelector(s);
const money=n=>"$"+Math.round(n).toLocaleString("es-AR");
const initials=n=>n.split(" ").slice(0,2).map(w=>w[0]).join("").toUpperCase();
const empById=id=>id==="jefe"?JEFE:EMPLEADOS.find(e=>e.id===id);
const MESN=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
const TODAY=new Date("2026-07-15T00:00:00");
function fdShort(iso){const d=new Date(iso+"T00:00:00");return {d:d.getDate(),m:MESN[d.getMonth()]}}
function fdLong(iso){const d=new Date(iso+"T00:00:00");return d.getDate()+" "+MESN[d.getMonth()]}
function plazoClass(iso,done){if(done)return"ok";const diff=(new Date(iso+"T00:00:00")-TODAY)/864e5;return diff<0?"late":diff<=7?"warn":"ok"}
function plazoTxt(iso,done){const diff=Math.round((new Date(iso+"T00:00:00")-TODAY)/864e5);if(done)return"✓ Completado";if(diff<0)return"Vencido hace "+(-diff)+"d";if(diff===0)return"Vence hoy";return"Vence en "+diff+"d · "+fdLong(iso)}
let idc=1000; const uid=()=>++idc;

function computeFin(){
  let totIng=0,totEgr=0; const pm={}, pc={};
  ST.movimientos.forEach(m=>{
    const v=+m.monto||0; const d=new Date(m.fecha+"T00:00:00");
    const k=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
    pm[k]=pm[k]||{ing:0,egr:0};
    if(m.tipo==="INGRESO"){totIng+=v;pm[k].ing+=v;}
    else{totEgr+=v;pm[k].egr+=v;pc[m.categoria]=(pc[m.categoria]||0)+v;}
  });
  const meses=Object.keys(pm).sort().map(k=>({key:k,label:MESN[+k.split("-")[1]-1],...pm[k]}));
  const cats=Object.entries(pc).map(([cat,val])=>({cat,val})).sort((a,b)=>b.val-a.val);
  return {totIng,totEgr,totNeto:totIng-totEgr,meses,cats};
}

let pinBuf="",pinTarget=null,pinMode="enter",pinFirst="";
function startPin(emp,role){
  pinTarget={emp,role};pinBuf="";pinFirst="";
  const hasPin = role==="jefe" ? true : !!ST.pins[emp.id];
  pinMode = hasPin ? "enter" : "create";
  $("#whoStep").classList.add("hidden");$("#pinPad").classList.remove("hidden");
  $("#pinAvatar").textContent=role==="jefe"?"👑":initials(emp.nombre);
  $("#pinName").textContent=emp.nombre;

  $("#pinErr").textContent="";updateDots();
}
function updateDots(){document.querySelectorAll(".pindot").forEach((d,i)=>d.classList.toggle("on",i<pinBuf.length))}
function renderKeys(){
  const k=$("#keys");k.innerHTML="";
  ["1","2","3","4","5","6","7","8","9","⌫","0","✓"].forEach(key=>{
    const b=document.createElement("button");b.textContent=key;if(key==="⌫"||key==="✓")b.classList.add("wide");
    b.onclick=()=>{if(key==="⌫")pinBuf=pinBuf.slice(0,-1);else if(key==="✓"){submitPin();return}else if(pinBuf.length<4)pinBuf+=key;
      updateDots();if(pinBuf.length===4)setTimeout(submitPin,150)};
    k.appendChild(b);
  });
}
function submitPin(){
  if(pinBuf.length<4)return;
  if(pinMode==="create"){
    if(!pinFirst){pinFirst=pinBuf;pinBuf="";updateDots();$("#pinRole").textContent="Repetí el PIN para confirmar";return;}
    if(pinBuf===pinFirst){ST.pins[pinTarget.emp.id]=pinBuf;saveState();SESSION={emp:pinTarget.emp,role:"empleado"};enterApp();}
    else{$("#pinErr").textContent="No coincide, empezá de nuevo";pinFirst="";pinBuf="";updateDots();$("#pinRole").textContent="Creá tu PIN de 4 dígitos";}
    return;
  }
  const good = pinTarget.role==="jefe" ? pinBuf===ST.pins.jefe : pinBuf===ST.pins[pinTarget.emp.id];
  if(good){SESSION={emp:pinTarget.emp,role:pinTarget.role};enterApp();}
  else{$("#pinErr").textContent="PIN incorrecto";pinBuf="";updateDots();}
}

    <div class="flexbtns"><button class="btn" id="oSave">Guardar</button><button class="btn ghost" onclick="closeModal()">Cancelar</button></div>`);
  $("#oWho").querySelectorAll("input").forEach(chk=>chk.onchange=()=>{
    if(chk.value==="todos"&&chk.checked){$("#oWho").querySelectorAll("input").forEach(x=>{if(x.value!=="todos"){x.checked=false;x.parentElement.classList.remove("on")}});}
    else if(chk.value!=="todos"&&chk.checked){const t=$("#oWho").querySelector('input[value="todos"]');t.checked=false;t.parentElement.classList.remove("on");}
    chk.parentElement.classList.toggle("on",chk.checked);
  });
  $("#oSave").onclick=()=>{
    const t=$("#oT").value.trim();if(!t)return;

    saveState();closeModal();go("objetivos");
  };
}

function changePinModal(uidTarget){
  openModal(`<h3>Cambiar PIN</h3>
    <div class="field"><label>Nuevo PIN (4 dígitos)</label><input id="np1" type="tel" maxlength="4" inputmode="numeric" placeholder="••••"></div>
    <div class="field"><label>Repetir PIN</label><input id="np2" type="tel" maxlength="4" inputmode="numeric" placeholder="••••"></div>
    <div class="err" id="npErr"></div>
    <div class="flexbtns"><button class="btn" id="npSave">Guardar</button><button class="btn ghost" onclick="closeModal()">Cancelar</button></div>`);
  $("#npSave").onclick=()=>{
    const a=$("#np1").value,b=$("#np2").value;
    if(!/^\d{4}$/.test(a)){$("#npErr").textContent="El PIN debe tener 4 dígitos";return;}
    if(a!==b){$("#npErr").textContent="No coinciden";return;}
    ST.pins[uidTarget]=a;saveState();closeModal();
  };
}

/* ===================== CHARTS ===================== */
const YEL="#ffd21e",GREEN="#3ecf8e",RED="#ff5c5c",BLUE="#5b9dff",MUT="#8f8f8f";
Chart.defaults.color=MUT;Chart.defaults.font.family="-apple-system,Segoe UI,Roboto,sans-serif";Chart.defaults.borderColor="#2a2a2a";
function drawMes(id,F){new Chart($("#"+id),{type:"bar",data:{labels:F.meses.map(m=>m.label),
  datasets:[{label:"Ingresos",data:F.meses.map(m=>m.ing),backgroundColor:GREEN,borderRadius:5},{label:"Egresos",data:F.meses.map(m=>m.egr),backgroundColor:RED,borderRadius:5}]},options:optM()});}
function drawNeto(id,F){const n=F.meses.map(m=>m.ing-m.egr);new Chart($("#"+id),{type:"bar",data:{labels:F.meses.map(m=>m.label),datasets:[{label:"Neto",data:n,backgroundColor:n.map(x=>x>=0?GREEN:RED),borderRadius:5}]},options:optM(false)});}
function drawCat(id,F){if(!F.cats.length){$("#"+id).parentElement.innerHTML='<div class="empty">Sin egresos cargados</div>';return;}
  new Chart($("#"+id),{type:"doughnut",data:{labels:F.cats.map(c=>c.cat),datasets:[{data:F.cats.map(c=>c.val),backgroundColor:[YEL,"#ffe06b",BLUE,GREEN,RED,MUT,"#c88bff"],borderWidth:0}]},options:{maintainAspectRatio:false,plugins:{legend:{position:"right",labels:{boxWidth:12,font:{size:11}}}}}});}
function optM(legend=true){return{maintainAspectRatio:false,plugins:{legend:{display:legend,position:"bottom",labels:{boxWidth:12}}},scales:{y:{ticks:{callback:v=>"$"+(v/1e6).toFixed(1)+"M"}}}};}

/* ===================== MODAL ===================== */
function openModal(html){$("#modalRoot").innerHTML=`<div class="modal" onclick="if(event.target===this)closeModal()"><div class="sheet">${html}</div></div>`;}
function closeModal(){$("#modalRoot").innerHTML="";}

if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  navigator.serviceWorker.register('sw.js').catch(function(){});
}
