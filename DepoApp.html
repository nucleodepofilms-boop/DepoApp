<style>
  :root{--bg:#0a0a0a;--panel:#141414;--panel2:#1c1c1c;--line:#2a2a2a;--txt:#f2f2f2;--muted:#8f8f8f;
    --yellow:#ffd21e;--yellow2:#ffe06b;--yellowd:#3a3208;--green:#3ecf8e;--red:#ff5c5c;--blue:#5b9dff;--amber:#f5b942;--purple:#c88bff;--radius:16px}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:15px;line-height:1.45}
  .hidden{display:none!important}
  button{font-family:inherit;cursor:pointer;border:none;outline:none}
  input,select,textarea{font-family:inherit;font-size:15px}
  ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:8px}
  .logomark{display:inline-flex;align-items:center;gap:10px}
  .logotext{font-weight:800;letter-spacing:-.5px;line-height:1}.logotext b{color:var(--yellow)}
  #login{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:radial-gradient(1200px 600px at 50% -5%,#1c1a0a 0%,var(--bg) 55%)}
  #login .logomark{margin-bottom:6px}
  .tagline{color:var(--muted);margin-bottom:26px;font-size:12px;letter-spacing:3px;text-transform:uppercase}
  .who{width:100%;max-width:440px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .who button{background:var(--panel);border:1px solid var(--line);color:var(--txt);padding:14px 10px;border-radius:14px;font-weight:600;display:flex;flex-direction:column;gap:6px;align-items:center;transition:.15s}
  .who button:hover{border-color:var(--yellow);transform:translateY(-2px)}
  .who button.boss{grid-column:1/-1;background:linear-gradient(135deg,#2a2408,#141414);border-color:var(--yellow)}
  .avatar{width:40px;height:40px;border-radius:50%;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--yellow);font-size:15px;border:1px solid var(--line)}
  .who small{color:var(--muted);font-weight:500;font-size:11.5px}
  #pinPad{width:100%;max-width:320px;text-align:center}
  #pinPad h3{margin:6px 0 2px}#pinPad p{color:var(--muted);margin:0 0 8px;font-size:13px}
  .pindots{display:flex;gap:12px;justify-content:center;margin:16px 0}
  .pindot{width:14px;height:14px;border-radius:50%;border:2px solid var(--line)}
  .pindot.on{background:var(--yellow);border-color:var(--yellow)}
  .keys{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .keys button{background:var(--panel);border:1px solid var(--line);color:var(--txt);height:60px;border-radius:14px;font-size:22px;font-weight:600}
  .keys button:active{background:var(--yellow);color:#111}
  .keys button.wide{font-size:15px}
  .link{color:var(--muted);background:none;margin-top:14px;font-size:13px;text-decoration:underline}
  .err{color:var(--red);font-size:13px;min-height:18px;margin-top:4px}
  #app{max-width:1100px;margin:0 auto;padding-bottom:96px}
  .topbar{position:sticky;top:0;z-index:20;background:rgba(10,10,10,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:10px 14px;display:flex;align-items:center;gap:10px}
  .topbar .spacer{flex:1}
  .userchip{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);padding:5px 10px 5px 5px;border-radius:30px;font-size:13px;font-weight:600}
  .userchip .avatar{width:26px;height:26px;font-size:11px}
  .roletag{font-size:10px;text-transform:uppercase;letter-spacing:1px;padding:2px 7px;border-radius:20px;background:var(--yellowd);color:var(--yellow2);border:1px solid #4a3f0e}
  .roletag.emp{background:#132030;color:var(--blue);border-color:#274158}
  .iconbtn{background:var(--panel);border:1px solid var(--line);color:var(--muted);width:34px;height:34px;border-radius:10px;font-size:16px}
  .iconbtn:hover{color:var(--yellow);border-color:var(--yellow)}
  main{padding:16px}
  .pagetitle{font-size:22px;font-weight:800;margin:6px 2px 16px}
  .pagetitle small{display:block;font-size:13px;color:var(--muted);font-weight:500;margin-top:2px}
  .sectitle{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:22px 2px 10px;font-weight:700}
  .sectitle:first-child{margin-top:6px}
  .grid{display:grid;gap:12px}.kpis{grid-template-columns:repeat(2,1fr)}

  .g2{grid-template-columns:1fr}@media(min-width:760px){.g2{grid-template-columns:1fr 1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px}
  .kpi .lbl{color:var(--muted);font-size:11.5px;text-transform:uppercase;letter-spacing:.5px}
  .kpi .val{font-size:22px;font-weight:800;margin-top:4px}
  .kpi .sub{font-size:12px;color:var(--muted);margin-top:2px}
  .val.green{color:var(--green)}.val.red{color:var(--red)}.val.gold{color:var(--yellow)}
  .phead{display:flex;gap:14px;align-items:center;background:linear-gradient(135deg,#211d08,#141414);border:1px solid #3a3208;border-radius:var(--radius);padding:18px}
  .phead .big{width:64px;height:64px;border-radius:50%;background:var(--panel2);border:2px solid var(--yellow);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:var(--yellow)}
  .phead .n{font-size:20px;font-weight:800}.phead .r{color:var(--muted);font-size:13px;margin-top:2px}
  .alertbanner{display:flex;align-items:center;gap:10px;background:#2a2408;border:1px solid var(--yellow);border-radius:14px;padding:12px 14px;margin:14px 0;font-weight:600;font-size:14px}

  .match{display:flex;gap:12px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:10px}
  .match.nuevo{border-color:var(--yellow);box-shadow:0 0 0 1px var(--yellow) inset}
  .match .day{width:50px;text-align:center;flex-shrink:0}
  .match .day .d{font-size:20px;font-weight:800;line-height:1}
  .match .day .m{font-size:11px;color:var(--muted);text-transform:uppercase}
  .match .info{flex:1;min-width:0}.match .info .club{font-weight:700}
  .match .info .meta{font-size:12.5px;color:var(--muted);margin-top:2px}
  .match .right{text-align:right;flex-shrink:0}
  .pill{display:inline-block;font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap}
  .pill.prox{background:#132030;color:var(--blue)}.pill.film{background:#132a20;color:var(--green)}
  .pill.entreg{background:var(--yellowd);color:var(--yellow2)}
  .pill.edi{background:#241330;color:var(--purple)}.pill.noedi{background:#22262e;color:var(--muted)}
  .pill.nuevo{background:var(--yellow);color:#111}
  .pill.comp{background:#0e2a24;color:var(--green)}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;font-weight:700}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .tablewrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  tr.clk{cursor:pointer}tr.clk:hover td{background:var(--panel2)}
  .badge{font-size:10.5px;padding:2px 8px;border-radius:20px;font-weight:700}
  .badge.activo{background:#132a20;color:var(--green)}.badge.riesgo{background:#2e2513;color:var(--amber)}
  .badge.inactivo{background:#2a1a1a;color:var(--red)}
  .badge.ing{background:#132a20;color:var(--green)}.badge.egr{background:#2a1a1a;color:var(--red)}
  .badge.si{background:#132a20;color:var(--green)}.badge.no{background:#2a1a1a;color:var(--red)}
  .clubcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden}
  .clubhead{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer}
  .clubhead .nm{font-weight:700;flex:1}
  .clubhead .nm small{display:block;color:var(--muted);font-size:12px;font-weight:500}
  .clubhead .arw{color:var(--muted);transition:.2s;font-size:13px}

  .catrow{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px dashed var(--line)}

  .catrow .cn small{display:block;color:var(--muted);font-size:11.5px}
  .catrow .pr{font-weight:700;color:var(--yellow);font-variant-numeric:tabular-nums;text-align:right}
  .catrow .pr small{display:block;color:var(--green);font-weight:600;font-size:11px}
  .obj{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;display:flex;gap:12px}

  .obj .body{flex:1;min-width:0}.obj .t{font-weight:700}
  .obj.done .t{text-decoration:line-through;color:var(--muted)}

  .tag{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;margin-top:6px;display:inline-block;margin-right:5px}
  .tag.ok{background:#132a20;color:var(--green)}.tag.warn{background:#2e2513;color:var(--amber)}
  .tag.late{background:#2a1a1a;color:var(--red)}.tag.who{background:#132030;color:var(--blue)}
  .progressbar{height:8px;background:var(--panel2);border-radius:8px;overflow:hidden;margin-top:8px}
  .progressbar>div{height:100%;background:linear-gradient(90deg,var(--yellow),var(--yellow2))}
  .btn{background:var(--yellow);color:#111;font-weight:700;padding:11px 16px;border-radius:12px}
  .btn.ghost{background:var(--panel2);color:var(--txt);border:1px solid var(--line)}
  .btn.sm{padding:7px 12px;font-size:13px;border-radius:10px}
  .btn.danger{background:#3a1e1e;color:var(--red);border:1px solid #5a2b2b}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
  .field input,.field select,.field textarea{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:11px 12px;border-radius:10px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .chkline{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;margin-bottom:6px;cursor:pointer}
  .chkline input{width:auto}.chkline.on{border-color:var(--yellow)}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:50;display:flex;align-items:flex-end;justify-content:center}
  @media(min-width:640px){.modal{align-items:center;padding:20px}}
  .modal .sheet{background:var(--panel);border:1px solid var(--line);border-radius:20px 20px 0 0;width:100%;max-width:520px;padding:20px;max-height:92vh;overflow:auto}
  @media(min-width:640px){.modal .sheet{border-radius:20px}}
  .modal h3{margin:0 0 16px}
  .bottomnav{position:fixed;bottom:0;left:0;right:0;z-index:30;background:rgba(15,15,15,.96);backdrop-filter:blur(10px);border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:8px 2px 10px;max-width:1100px;margin:0 auto}
  .bottomnav button{background:none;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9.5px;font-weight:600;padding:4px 4px;border-radius:10px;flex:1;min-width:0}
  .bottomnav button .ic{font-size:18px;line-height:1}
  .bottomnav button.active{color:var(--yellow)}
  .note{background:#1a1808;border:1px solid #3a3208;color:#e6d98f;font-size:12.5px;padding:10px 12px;border-radius:12px;margin-bottom:14px}
  .empty{color:var(--muted);text-align:center;padding:30px 10px}
  .chartbox{position:relative;height:230px}
  .flexbtns{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
</style>
</head>

const ONESIGNAL_APP_ID="55f23b36-7eed-47b8-9742-84c48180ff5a";
window.OneSignalDeferred=window.OneSignalDeferred||[];
function initPush(){if(!ONESIGNAL_APP_ID)return;window.OneSignalDeferred.push(async function(O){try{
  await O.init({appId:ONESIGNAL_APP_ID, allowLocalhostAsSecureOrigin:true,
    serviceWorkerPath:"sw.js", serviceWorkerParam:{scope:"./"}})
}catch(e){}})}
function pushLoginEmpleado(id){if(!ONESIGNAL_APP_ID)return;window.OneSignalDeferred.push(function(O){try{O.login(id)}catch(e){}})}
function pushLogout(){if(!ONESIGNAL_APP_ID)return;window.OneSignalDeferred.push(function(O){try{O.logout()}catch(e){}})}
function pedirPermisoPush(){
  if(!ONESIGNAL_APP_ID){alert('Falta configurar OneSignal (App ID).');return}
  if(!('Notification' in window)){alert('Este navegador no soporta notificaciones.');return}
  var esIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  var instalada=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone===true;
  if(esIOS&&!instalada){alert('📱 En iPhone primero tenés que instalar la app:\n\n1) Tocá el botón Compartir (el cuadrado con la flecha hacia arriba)\n2) Elegí Agregar a pantalla de inicio\n3) Abrí DepoApp desde ese ícono nuevo\n4) Volvé a tocar Activar notificaciones\n\nEs una limitación de Apple, no de la app.');return}
  if(Notification.permission==='granted'){alert('🔔 Ya tenés las notificaciones activadas.');return}
  if(Notification.permission==='denied'){alert('🔕 Las notificaciones están bloqueadas para este sitio.\n\nTocá el candado al lado de la dirección web, entrá a Permisos y activá Notificaciones. Después volvé a probar.');return}
  window.OneSignalDeferred.push(async function(O){
    try{ await O.Notifications.requestPermission();
      setTimeout(function(){
        if(Notification.permission==='granted')alert('✅ ¡Listo! Te vamos a avisar cuando tengas un partido nuevo o algún cambio.');
        else alert('No quedaron activadas. Volvé a tocar el botón y elegí Permitir.');
      },1000);
    }catch(e){alert('No se pudieron activar.\n\nDetalle: '+(e&&e.message?e.message:e));}
  });
}

function fdShort(iso){const d=new Date(iso+"T00:00:00");return{d:d.getDate(),m:MESN[d.getMonth()]}}
function fdLong(iso){const d=new Date(iso+"T00:00:00");return d.getDate()+" "+MESN[d.getMonth()]}
function plazoClass(iso,done){if(done)return"ok";const df=(new Date(iso+"T00:00:00")-TODAY)/864e5;return df<0?"late":df<=7?"warn":"ok"}
function plazoTxt(iso,done){const df=Math.round((new Date(iso+"T00:00:00")-TODAY)/864e5);if(done)return"✓ Completado";if(df<0)return"Vencido hace "+(-df)+"d";if(df===0)return"Vence hoy";return"Vence en "+df+"d · "+fdLong(iso)}

function computeFin(){
  let ing=0,egr=0;const pm={},pc={};
  ST.movimientos.forEach(m=>{
    const v=+m.monto||0,d=new Date(m.fecha+"T00:00:00");
    const k=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
    pm[k]=pm[k]||{ing:0,egr:0};
    if(m.tipo==="INGRESO"){ing+=v;pm[k].ing+=v}else{egr+=v;pm[k].egr+=v;pc[m.categoria]=(pc[m.categoria]||0)+v}
  });
  return{totIng:ing,totEgr:egr,totNeto:ing-egr,
    meses:Object.keys(pm).sort().map(k=>({label:MESN[+k.split("-")[1]-1],...pm[k]})),
    cats:Object.entries(pc).map(([cat,val])=>({cat,val})).sort((a,b)=>b.val-a.val)}
}
/* Liquidación de un empleado en el mes */
function liquidacion(empId,ym){
  ym=ym||"2026-07";
  const e=empById(empId),t=ST.tarifas;
  const mios=ST.partidos.filter(p=>p.emp===empId&&p.fecha.startsWith(ym));
  const esFoto=e.roles&&e.roles.foto;
  const porPartido=esFoto?t.fotoPorSesion:t.porPartido;
  const base=mios.length*porPartido;
  const viatico=e.viajeReal?(+t.viajeAgustin||0):(+t.viatico||0);
  const plusEditor=(e.roles&&e.roles.editor)?(+t.editor||0):0;
  const plusRedes=(e.roles&&e.roles.redes)?(+t.redes||0):0;
  const cerrados=ST.partidos.filter(p=>p.cerro===empId&&p.fecha.startsWith(ym));
  const comision=cerrados.reduce((a,p)=>a+(+p.precio2||0)*ST.tarifas.comisionPct/100,0);
  return{partidos:mios.length,base,viatico,plusEditor,plusRedes,comision:Math.round(comision),
    total:base+viatico+plusEditor+plusRedes+Math.round(comision)}
}

  if(pinBuf.length<4)return;

    if(!pinFirst){pinFirst=pinBuf;pinBuf="";updateDots();$("#pinRole").textContent="Repetí el PIN";return}
    if(pinBuf===pinFirst){ST.pins[pinTarget.emp.id]=pinBuf;saveState();SESSION={emp:pinTarget.emp,role:"empleado"};enterApp()}
    else{$("#pinErr").textContent="No coincide";pinFirst="";pinBuf="";updateDots();$("#pinRole").textContent="Creá tu PIN de 4 dígitos"}

  $("#pPag").onchange=e=>e.target.parentElement.classList.toggle("on",e.target.checked);
  fillCats(p.cat);
  $("#pSave").onclick=()=>{
    const c=ST.clubes.find(x=>x.club===$("#pClub").value);
    const ct=c&&c.cats.find(x=>x.cat===$("#pCat").value);
    if(!c||!ct){alert("Elegí club y categoría");return}
    const d={fecha:$("#pF").value,hora:$("#pH").value.trim(),cancha:$("#pCancha").value.trim(),club:c.club,cat:ct.cat,
      emp:$("#pEmp").value,edi:ct.edi,estado:$("#pEst").value,precio:+$("#pPrecio").value||0,
      club2:$("#pClub2").value.trim(),precio2:+$("#pPrecio2").value||0,cerro:$("#pCerro").value,
      pagado:$("#pPag").checked,nuevo:true};
    if(nuevo)ST.partidos.push(d);else Object.assign(p,d);
    saveState();closeModal();go("asignaciones")};
  if(!nuevo)$("#pDel").onclick=()=>{if(confirm("¿Borrar partido?")){ST.partidos.splice(idx,1);saveState();closeModal();go("asignaciones")}};
}

/* ===================== EQUIPO ===================== */
function viewEquipo(v){
  const ym="2026-07",t=ST.tarifas;
  const total=ST.empleados.filter(e=>e.activo!==false).reduce((a,e)=>a+liquidacion(e.id,ym).total,0);
  v.innerHTML=`<div class="pagetitle">Equipo <small>Empleados, roles y liquidación de julio</small></div>
    <div class="note">💡 Los valores de pago los cambiás en <b>⚙ Ajustes</b>. Acá definís quién hace qué: el rol determina qué plus cobra.</div>
    <div class="grid kpis"><div class="kpi"><div class="lbl">A pagar (julio)</div><div class="val gold">${money(total)}</div></div>
      <div class="kpi"><div class="lbl">Activos</div><div class="val">${ST.empleados.filter(e=>e.activo!==false).length}</div></div>
      <div class="kpi"><div class="lbl">Por partido</div><div class="val">${money(t.porPartido)}</div></div>
      <div class="kpi"><div class="lbl">Viático</div><div class="val">${money(t.viatico)}</div></div></div>
    <div class="flexbtns" style="margin:16px 0 8px"><button class="btn sm" id="addEmp">+ Sumar persona</button></div>
    <div class="tablewrap"><table><thead><tr><th>Persona</th><th>Roles</th><th class="num">Partidos</th><th class="num">A cobrar</th></tr></thead><tbody>
    ${ST.empleados.map((e,i)=>{const L=liquidacion(e.id,ym);const r=[];
      if(e.roles&&e.roles.camara)r.push("cámara");if(e.roles&&e.roles.editor)r.push("editor");
      if(e.roles&&e.roles.redes)r.push("redes");if(e.roles&&e.roles.foto)r.push("fotos");
      return `<tr class="clk" data-eemp="${i}"><td><b>${e.nombre}</b>${e.activo===false?' <span class="badge inactivo">baja</span>':''}<br><span style="color:var(--muted);font-size:11.5px">${e.transporte||''}${e.viajeReal?' · viajes reales':''}</span></td>
      <td style="font-size:12px">${r.join(", ")||'—'}</td><td class="num">${L.partidos}</td>
      <td class="num" style="color:var(--yellow)">${money(L.total)}</td></tr>`}).join("")}
    </tbody></table></div>`;
  v.querySelectorAll("[data-eemp]").forEach(r=>r.onclick=()=>empModal(+r.dataset.eemp));
  $("#addEmp").onclick=()=>empModal(null);
}
function empModal(idx){
  const nuevo=idx==null;
  const e=nuevo?{id:"",nombre:"",transporte:"",activo:true,roles:{camara:true,editor:false,redes:false,foto:false},viajeReal:false}:ST.empleados[idx];
  const L=nuevo?null:liquidacion(e.id);
  openModal(`<h3>${nuevo?'Sumar persona':e.nombre}</h3>
  <div class="field"><label>Nombre</label><input id="eN" value="${e.nombre}"></div>
  <div class="field"><label>Transporte</label><input id="eT" value="${e.transporte||''}" placeholder="Moto / Micro / Uber"></div>
  <div class="sectitle" style="margin:14px 0 8px">Roles (definen qué plus cobra)</div>
  <label class="chkline ${e.roles.camara?'on':''}"><input type="checkbox" id="rCam" ${e.roles.camara?'checked':''}> 🎥 Camarógrafo — cobra por partido</label>
  <label class="chkline ${e.roles.editor?'on':''}"><input type="checkbox" id="rEdi" ${e.roles.editor?'checked':''}> ✂️ Editor — plus mensual</label>
  <label class="chkline ${e.roles.redes?'on':''}"><input type="checkbox" id="rRed" ${e.roles.redes?'checked':''}> 📱 Redes — plus mensual</label>
  <label class="chkline ${e.roles.foto?'on':''}"><input type="checkbox" id="rFot" ${e.roles.foto?'checked':''}> 📸 Fotografía — cobra por sesión</label>
  <label class="chkline ${e.viajeReal?'on':''}"><input type="checkbox" id="rVia" ${e.viajeReal?'checked':''}> 🚗 Se le pagan los viajes reales (en vez del viático fijo)</label>
  <label class="chkline ${e.activo!==false?'on':''}"><input type="checkbox" id="rAct" ${e.activo!==false?'checked':''}> ✅ Activo</label>
  ${L?`<div class="note" style="margin-top:12px">Julio: ${L.partidos} partidos · base ${money(L.base)} · viático ${money(L.viatico)}${L.plusEditor?' · editor '+money(L.plusEditor):''}${L.plusRedes?' · redes '+money(L.plusRedes):''}${L.comision?' · comisiones '+money(L.comision):''} = <b>${money(L.total)}</b></div>`:''}
  <div class="flexbtns" style="margin-top:12px"><button class="btn" id="eSave">Guardar</button><button class="btn ghost" onclick="closeModal()">Cancelar</button>
  ${nuevo?'':'<button class="btn danger" id="eDel">Borrar</button>'}</div>`);
  ["rCam","rEdi","rRed","rFot","rVia","rAct"].forEach(id=>$("#"+id).onchange=ev=>ev.target.parentElement.classList.toggle("on",ev.target.checked));
  $("#eSave").onclick=()=>{
    const n=$("#eN").value.trim();if(!n){alert("Poné el nombre");return}
    const d={nombre:n,transporte:$("#eT").value.trim(),activo:$("#rAct").checked,viajeReal:$("#rVia").checked,
      roles:{camara:$("#rCam").checked,editor:$("#rEdi").checked,redes:$("#rRed").checked,foto:$("#rFot").checked}};
    if(nuevo){const id=n.toLowerCase().replace(/[^a-z]/g,"").slice(0,6)+Math.floor(Math.random()*99);ST.empleados.push({id,...d})}
    else Object.assign(e,d);
    saveState();closeModal();go("equipo")};
  if(!nuevo)$("#eDel").onclick=()=>{if(confirm("¿Borrar a "+e.nombre+"? Se pierden sus datos.")){ST.empleados.splice(idx,1);saveState();closeModal();go("equipo")}};
}

/* ===================== AJUSTES ===================== */
function ajustesModal(){
  const t=ST.tarifas,c=ST.config;
  openModal(`<h3>⚙ Ajustes</h3>
  <div class="sectitle" style="margin-top:0">Cuánto pagás</div>
  <div class="row2"><div class="field"><label>Por partido (cámara)</label><input id="aPP" type="number" value="${t.porPartido}"></div>
  <div class="field"><label>Por sesión (fotos)</label><input id="aFot" type="number" value="${t.fotoPorSesion}"></div></div>
  <div class="row2"><div class="field"><label>Viático fijo mensual</label><input id="aVia" type="number" value="${t.viatico}"></div>
  <div class="field"><label>Viajes reales (quien aplique)</label><input id="aVR" type="number" value="${t.viajeAgustin}"></div></div>
  <div class="row2"><div class="field"><label>Plus editor</label><input id="aEd" type="number" value="${t.editor}"></div>
  <div class="field"><label>Plus redes</label><input id="aRe" type="number" value="${t.redes}"></div></div>
  <div class="field"><label>Comisión por cerrar 2º equipo (% de lo que paga)</label><input id="aCom" type="number" value="${t.comisionPct}"></div>
  <div class="sectitle">Porcentajes comerciales</div>
  <div class="row2"><div class="field"><label>Aumento a aplicar (%)</label><input id="cAum" type="number" value="${c.aumentoPct}"></div>
  <div class="field"><label>Precio compartido (% del individual)</label><input id="cComp" type="number" value="${c.compartidoPct}"></div></div>
  <div class="field"><label>Descuento por abono prepago (%)</label><input id="cDesc" type="number" value="${c.descuentoAbonoPct}"></div>
  <button class="btn sm" id="aSave">Guardar todo</button>
  <div class="sectitle">PIN</div>
  <button class="btn sm ghost" id="aChg">Cambiar mi PIN</button>
  <div id="aPins" style="margin-top:10px">${ST.empleados.map(e=>`<div class="chkline" style="cursor:default"><span style="flex:1">${e.nombre}</span>
    <span style="color:${ST.pins[e.id]?'var(--green)':'var(--muted)'};font-size:12px">${ST.pins[e.id]?'PIN activo':'sin PIN'}</span>
    ${ST.pins[e.id]?`<button class="btn sm danger" data-rp="${e.id}">Resetear</button>`:''}</div>`).join("")}</div>
  <div class="flexbtns" style="margin-top:16px"><button class="btn ghost" onclick="closeModal()">Cerrar</button>
  <button class="btn danger" id="aReset">Borrar todo y volver al inicio</button></div>`);
  $("#aSave").onclick=()=>{
    ST.tarifas={porPartido:+$("#aPP").value||0,fotoPorSesion:+$("#aFot").value||0,viatico:+$("#aVia").value||0,
      viajeAgustin:+$("#aVR").value||0,editor:+$("#aEd").value||0,redes:+$("#aRe").value||0,comisionPct:+$("#aCom").value||0};
    ST.config={aumentoPct:+$("#cAum").value||0,compartidoPct:+$("#cComp").value||70,descuentoAbonoPct:+$("#cDesc").value||0};
    saveState();$("#aSave").textContent="✓ Guardado"};
  $("#aChg").onclick=()=>changePinModal("jefe");
  $("#aPins").querySelectorAll("[data-rp]").forEach(b=>b.onclick=()=>{if(confirm("¿Resetear PIN?")){delete ST.pins[b.dataset.rp];saveState();ajustesModal()}});
  $("#aReset").onclick=()=>{if(confirm("Borra TODO lo cargado y vuelve a los datos iniciales. ¿Seguro?")){const p=ST.pins;localStorage.removeItem(LS_KEY);ST=loadState();ST.pins=p;saveState();closeModal();go("resumen")}};
}
function changePinModal(uidT){
  openModal(`<h3>Cambiar PIN</h3><div class="field"><label>Nuevo PIN (4 dígitos)</label><input id="np1" type="tel" maxlength="4" inputmode="numeric"></div>
  <div class="field"><label>Repetir</label><input id="np2" type="tel" maxlength="4" inputmode="numeric"></div><div class="err" id="npE"></div>
  <div class="flexbtns"><button class="btn" id="npS">Guardar</button><button class="btn ghost" onclick="closeModal()">Cancelar</button></div>`);
  $("#npS").onclick=()=>{const a=$("#np1").value,b=$("#np2").value;
    if(!/^\d{4}$/.test(a)){$("#npE").textContent="Deben ser 4 dígitos";return}
    if(a!==b){$("#npE").textContent="No coinciden";return}
    ST.pins[uidT]=a;saveState();closeModal()};
}

/* ===================== CHARTS ===================== */
const YEL="#ffd21e",GREEN="#3ecf8e",RED="#ff5c5c",BLUE="#5b9dff",MUT="#8f8f8f";
Chart.defaults.color=MUT;Chart.defaults.borderColor="#2a2a2a";
function drawMes(id,F){if(!F.meses.length)return;new Chart($("#"+id),{type:"bar",data:{labels:F.meses.map(m=>m.label),
  datasets:[{label:"Ingresos",data:F.meses.map(m=>m.ing),backgroundColor:GREEN,borderRadius:5},{label:"Egresos",data:F.meses.map(m=>m.egr),backgroundColor:RED,borderRadius:5}]},options:opt()})}
function drawNeto(id,F){if(!F.meses.length)return;const n=F.meses.map(m=>m.ing-m.egr);
  new Chart($("#"+id),{type:"bar",data:{labels:F.meses.map(m=>m.label),datasets:[{label:"Neto",data:n,backgroundColor:n.map(x=>x>=0?GREEN:RED),borderRadius:5}]},options:opt(false)})}
function drawCat(id,F){if(!F.cats.length){$("#"+id).parentElement.innerHTML='<div class="empty">Sin egresos cargados</div>';return}
  new Chart($("#"+id),{type:"doughnut",data:{labels:F.cats.map(c=>c.cat),datasets:[{data:F.cats.map(c=>c.val),backgroundColor:[YEL,"#ffe06b",BLUE,GREEN,RED,MUT,"#c88bff"],borderWidth:0}]},
    options:{maintainAspectRatio:false,plugins:{legend:{position:"right",labels:{boxWidth:12,font:{size:11}}}}}})}
function opt(leg=true){return{maintainAspectRatio:false,plugins:{legend:{display:leg,position:"bottom",labels:{boxWidth:12}}},
  scales:{y:{ticks:{callback:v=>"$"+(v/1e6).toFixed(1)+"M"}}}}}

/* ===================== MODAL ===================== */
function openModal(h){$("#modalRoot").innerHTML=`<div class="modal" onclick="if(event.target===this)closeModal()"><div class="sheet">${h}</div></div>`}
function closeModal(){$("#modalRoot").innerHTML=""}

/* ===================== INIT ===================== */
renderWho();renderKeys();initPush();
if('serviceWorker' in navigator && location.protocol.startsWith('http')){navigator.serviceWorker.register('sw.js').catch(function(){})}
</script>
